services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nocodb:
    image: nocodb/nocodb:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      NC_DB: "pg://${POSTGRES_HOST}:${POSTGRES_PORT}?u=${POSTGRES_USER}&p=${POSTGRES_PASSWORD}&d=${POSTGRES_DB}"
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET}
      NC_PUBLIC_URL: ${NC_PUBLIC_URL}
    volumes:
      - nocodb_data:/usr/app/data

  reestr-updater:
    build: ./updater
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./updater:/app
    command: python /app/import_reestr.py

  sub-proxy:
    image: python:3.12-slim
    container_name: sub-proxy
    restart: unless-stopped
    volumes:
      - ./sub_proxy.py:/app/sub_proxy.py
    command: python /app/sub_proxy.py

  v2raya:
    image: mzz2017/v2raya:latest
    container_name: v2raya
    restart: unless-stopped
    privileged: true
    depends_on:
      - sub-proxy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "2017:2017"
      - "20170:20170"
      - "20171:20171"
      - "20172:20172"
    environment:
      V2RAYA_ADDRESS: 0.0.0.0:2017
      V2RAYA_LOG_LEVEL: debug
    volumes:
      - v2raya_data:/etc/v2raya
      - /lib/modules:/lib/modules:ro

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    depends_on:
      - v2raya
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./.env:/app/.env
      - litellm_data:/app/data
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      # Направляем трафик litellm через HTTP прокси v2raya
      HTTP_PROXY: "http://v2raya:20171"
      HTTPS_PROXY: "http://v2raya:20171"
      ALL_PROXY: "http://v2raya:20171"
      NO_PROXY: "localhost,127.0.0.1,litellm,v2raya,postgres"
    command: --config /app/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:4000/health/liveness\")'"]
      interval: 30s
      timeout: 10s
      retries: 3

  telegram-bot:
    build: ./telegram-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
      v2raya:
        condition: service_started
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      ADMIN_ID: ${ADMIN_ID}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # Направляем внешний трафик (Telegram API, Tavily) через VPN
      HTTP_PROXY: "http://v2raya:20171"
      HTTPS_PROXY: "http://v2raya:20171"
      ALL_PROXY: "http://v2raya:20171"
      # ИСКЛЮЧАЕМ внутренние сервисы из проксирования (КРИТИЧНО для скорости)
      NO_PROXY: "localhost,127.0.0.1,postgres,litellm,v2raya,sub-proxy"
    volumes:
      - ./telegram-bot/config:/app/config
      - ./telegram-bot/logs:/app/logs

volumes:
  postgres_data:
  nocodb_data:
  litellm_data:
  v2raya_data:
